<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in js</title>
</head>
<body>
    <script>
        // function in java script is a reasonable block of code designed to perform a specific task.

        function demo1() {
            console.log("hello JS");
        }
        demo1("react");

        function cal(a,b=10){
            console.log("the sum is "+(a+b));
        }
        cal(20);

        let msg=function(){
            console.log("this is a message");
        }
        msg();
        // share code for above function i.e. arrow function 
        let msg1=()=>{
            console.log("this is a message");
        }
        msg1();
    </script>
</body>
</html>
