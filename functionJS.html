<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in js</title>
</head>
<body>
    <script>
        // function in java script is a reasonable block of code designed to perform a specific task.

        function demo1() {
            console.log("hello JS");
        }
        demo1("react");

        function cal(a,b=10){
            console.log("the sum is "+(a+b));
        }
        cal(20);

        let msg=function(){
            console.log("this is a message");
        }
        msg();
        // share code for above function i.e. arrow function 
        let msg1=()=>{
            console.log("this is a message");
        }
        msg1();
        // arrow function using multiline

        let add=(a,b)=>{
            console.log("first number is " + a);
            console.log("second number is " + b);
            console.log("the sum is " + (a+b));
        }
        add(4,5);

        (function(){
            console.log("this is an IIFE function");
        })
        // iife function using arrow function
        // (()=>console.log("this is an IIFE function using arrow function"))();
        
                   function mul(callback) {
                var num1 = 5;
                console.log("first number is " + num1);
                var num2 = 10;
                console.log("second number is " + num2);
                var result = num1 * num2;
                callback(result);

            }
            function result(result) {
                console.log("The result is: " + result);
            }
            mul(result);
            
            //callback function using setTimeout API
            function msg2() {
                console.log("Hello after 3 seconds");
                document.writeln("Hello");
            }
            function loading(){
                document.writeln("Loading...");
            };
            setTimeout(msg2, 3000);
            loading()
    </script>
</body>
</html>
